<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="displayDiv"></div>
  </body>
</html>
<script>
  let display = document.getElementById("displayDiv");
  let dataSize;
  async function fetchData() {
    let data = await fetch("https://jsonplaceholder.typicode.com/todos");
    let res = await data.json();
    console.log(res);
    dataSize = res.length;

    let dataS = dataSize / 10;
    let showData = dataSize / dataS;
    displayData(res, showData);
  }
  let currPage = 0;
  function displayData(data, size, currPage) {
    display.innerHTML = "";
    console.log(size);
    for (let i = currPage; i < size; i++) {
      console.log(data[i]);
    }
  }
  function nextPage(size, currPage) {
    currPage = currPage + size;
    size = size + 10;
    displayData(size, currPage);
  }
  nextPage();
  nextPage();
  nextPage();
  fetchData();
</script>
