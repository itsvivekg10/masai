<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Input Example</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container my-5">
      <h2 class="mb-4">Focus Input with Button</h2>

      <input
        id="myInput"
        type="text"
        class="form-control mb-3"
        placeholder="Click the button to focus me"
        style="padding: 10px; font-size: 16px"
      />

      <button id="focusButton" class="btn btn-primary">Focus Input</button>

      <p id="message" class="mt-3 fw-bold text-success" style="display: none">
        Focused!
      </p>
    </div>

    <script>
      const input = document.getElementById("myInput");
      const button = document.getElementById("focusButton");
      const message = document.getElementById("message");

      button.addEventListener("click", () => {
        input.focus();
        input.style.backgroundColor = "#e0f7fa"; // Light blue
        message.style.display = "block";
      });
    </script>
  </body>
</html>
