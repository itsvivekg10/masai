<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick & Morty Pagination (React CDN)</title>

    <!-- React and ReactDOM via CDN -->
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #f0f0f0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .card {
        background: white;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      .card img {
        width: 100%;
        border-radius: 8px;
      }
      .pagination {
        margin-top: 20px;
        text-align: center;
      }
      .pagination button {
        margin: 0 5px;
        padding: 6px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .active {
        background-color: #0088cc;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState, useRef } = React;

      function App() {
        const [characters, setCharacters] = useState([]);
        const [displayData, setDisplayData] = useState([]);
        const [totalPages, setTotalPages] = useState(0);
        const currentPageRef = useRef(1);
        const charactersPerPage = 10;

        useEffect(() => {
          async function fetchCharacters() {
            let all = [];
            let page = 1;
            let hasNext = true;

            while (hasNext) {
              const res = await fetch(
                `https://rickandmortyapi.com/api/character?page=${page}`
              );
              const data = await res.json();
              all = [...all, ...data.results];
              hasNext = !!data.info.next;
              page++;
            }

            setCharacters(all);
            setTotalPages(Math.ceil(all.length / charactersPerPage));
          }

          fetchCharacters();
        }, []);

        useEffect(() => {
          if (characters.length > 0) {
            updateDisplay();
          }
        }, [characters]);

        function updateDisplay() {
          const start = (currentPageRef.current - 1) * charactersPerPage;
          const end = start + charactersPerPage;
          setDisplayData(characters.slice(start, end));
        }

        function handlePageChange(page) {
          currentPageRef.current = page;
          updateDisplay();
        }

        return (
          <div>
            <h1>Rick and Morty Characters</h1>

            <div className="grid">
              {displayData.map((char) => (
                <div className="card" key={char.id}>
                  <img src={char.image} alt={char.name} />
                  <p>{char.name}</p>
                </div>
              ))}
            </div>

            <div className="pagination">
              {Array.from({ length: totalPages }, (_, i) => (
                <button
                  key={i + 1}
                  onClick={() => handlePageChange(i + 1)}
                  className={currentPageRef.current === i + 1 ? "active" : ""}
                >
                  {i + 1}
                </button>
              ))}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
