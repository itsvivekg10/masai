<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos Pagination</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container my-5">
      <h2 class="mb-4">Todos</h2>
      <ul id="todo-list" class="list-group mb-4"></ul>

      <nav>
        <ul id="pagination" class="pagination justify-content-center"></ul>
      </nav>
    </div>

    <script>
      const API_URL = "https://jsonplaceholder.typicode.com/todos";
      const todosPerPage = 10;
      let currentPage = 1;
      let todos = [];

      // Fetch data from API
      async function fetchTodos() {
        const response = await fetch(API_URL);
        todos = await response.json();
        renderTodos();
        renderPagination();
      }

      // Render the current page's todos
      function renderTodos() {
        const todoList = document.getElementById("todo-list");
        todoList.innerHTML = "";

        const start = (currentPage - 1) * todosPerPage;
        const end = start + todosPerPage;
        const currentTodos = todos.slice(start, end);

        currentTodos.forEach((todo) => {
          const li = document.createElement("li");
          li.className = "list-group-item";
          li.innerHTML = `<strong>${todo.title}</strong> - ${
            todo.completed ? "✅" : "❌"
          }`;
          todoList.appendChild(li);
        });
      }

      // Render pagination controls
      function renderPagination() {
        const totalPages = Math.ceil(todos.length / todosPerPage);
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        // Previous button
        const prevLi = document.createElement("li");
        prevLi.className = `page-item ${currentPage === 1 ? "disabled" : ""}`;
        prevLi.innerHTML = `<a class="page-link" href="#">Previous</a>`;
        prevLi.onclick = () => {
          if (currentPage > 1) {
            currentPage--;
            renderTodos();
            renderPagination();
          }
        };
        pagination.appendChild(prevLi);

        // Page number buttons
        for (let i = 1; i <= totalPages; i++) {
          const li = document.createElement("li");
          li.className = `page-item ${i === currentPage ? "active" : ""}`;
          li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
          li.onclick = () => {
            currentPage = i;
            renderTodos();
            renderPagination();
          };
          pagination.appendChild(li);
        }

        // Next button
        const nextLi = document.createElement("li");
        nextLi.className = `page-item ${
          currentPage === totalPages ? "disabled" : ""
        }`;
        nextLi.innerHTML = `<a class="page-link" href="#">Next</a>`;
        nextLi.onclick = () => {
          if (currentPage < totalPages) {
            currentPage++;
            renderTodos();
            renderPagination();
          }
        };
        pagination.appendChild(nextLi);
      }

      // Initial load
      fetchTodos();
    </script>
  </body>
</html>
