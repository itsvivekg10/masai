script<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h4>register Page</h4>

    <input type="email" id="email" />
    <input type="text" id="pass" />

    <button id="sign-up">SIGN-UP</button>
    <h4>login</h4>
    <input type="email" id="email" />
    <input type="text" id="pass" />
    <button id="login">Login</button>
    <h4 id="userName">WELCOME</h4>

    <button id="log-out">LOG-OUT</button>
  </body>
</html>
<script type="module">
  let signUp = document.getElementById("sign-up");

  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut,
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyCin2_wWI8EqpvFepc-R292TXWJyFn0hn4",
    authDomain: "auth-555b8.firebaseapp.com",
    projectId: "auth-555b8",
    storageBucket: "auth-555b8.firebasestorage.app",
    messagingSenderId: "351282175251",
    appId: "1:351282175251:web:33c89584c94cacfb434ee6",
    measurementId: "G-C43XS4SK9M",
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth();
  signUp.addEventListener("click", () => {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;
    // let name = document.getElementById("name").value;
    createUserWithEmailAndPassword(auth, email, pass)
      .then((userCredentials) => {
        window.location.href = "DashBord.html";
        console.log("user ADed");
      })
      .catch((err) => {
        console.log(err);
      });
  });
  let login = document.getElementById("login");
  login.addEventListener("click", () => {
    let email = document.getElementById("email").value;
    let pass = document.getElementById("pass").value;
    signInWithEmailAndPassword(auth, email, pass)
      .then((userCredentials) => {
        window.location.href = "DashBord.html";
        console.log("completed");
      })
      .catch((err) => {
        console.log(err);
      });
  });

  let userName = document.getElementById("userName");
  onAuthStateChanged(auth, (user) => {
    if (user) {
      userName.innerText = `welcome ${user.email} `;

      console.log(user);
    } else {
      userName.innerText = "";
    }
  });
  let logOut = document.getElementById("log-out");
  logOut.addEventListener("click", () => {
    signOut(auth)
      .then(() => {
        console.log("user out");
      })
      .catch((err) => {
        console.log(err);
      });
  });
</script>
