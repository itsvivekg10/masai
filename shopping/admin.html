<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Kart Admin</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f5f7fa;
        padding: 20px;
      }

      /* Premium NAVBAR */
      #nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 30px;
        border-radius: 12px;
        background: linear-gradient(to right, #0072ff, #00c6ff);
        color: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        margin-bottom: 30px;
      }

      #nav span:first-child {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 1px;
      }

      #admin {
        font-size: 18px;
        font-weight: 500;
        background-color: rgba(255, 255, 255, 0.2);
        padding: 8px 16px;
        border-radius: 20px;
      }

      #logoutBtn {
        padding: 10px 18px;
        background-color: white;
        color: #0072ff;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: all 0.3s ease-in-out;
      }

      #logoutBtn:hover {
        background-color: #f1f1f1;
        transform: scale(1.05);
      }

      .input-area {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        max-width: 500px;
      }

      .input-area h3 {
        margin-bottom: 15px;
        color: #333;
      }

      .input-area input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .input-area button {
        padding: 10px 20px;
        background-color: #0088cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s ease;
      }

      .input-area button:hover {
        background-color: #0073b1;
      }

      #updateUi {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .card {
        background-color: white;
        width: 220px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .card h4 {
        font-size: 18px;
        margin-bottom: 5px;
        color: #333;
      }

      .card h5 {
        color: #666;
        margin-bottom: 10px;
      }

      .card button {
        padding: 6px 10px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s ease;
      }

      .card button:first-of-type {
        background-color: #ffc107;
        color: white;
      }

      .card button:last-of-type {
        background-color: #dc3545;
        color: white;
      }

      .card button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div id="nav">
      <span>E-Kart Admin</span>
      <span id="admin">Welcome</span>
      <button id="logoutBtn">Logout</button>
    </div>

    <div class="input-area">
      <h3>Add Your Product</h3>
      <input id="ProductName" placeholder="Product Name" type="text" />
      <input id="imglink" placeholder="Image URL" type="text" />
      <input id="productPrice" placeholder="Price" type="number" />
      <button id="addbtn">Add Product</button>
    </div>

    <div id="updateUi"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        getDocs,
        addDoc,
        collection,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCHw65zq7-ZlMhDjLhwcy1lVxv98tNL40E",
        authDomain: "authentication-9762a.firebaseapp.com",
        projectId: "authentication-9762a",
        storageBucket: "authentication-9762a.appspot.com",
        messagingSenderId: "1077604200859",
        appId: "1:1077604200859:web:f685d2c47ac5fdfd85b13e",
        measurementId: "G-X84XVF1026",
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const adminName = document.getElementById("admin");
      const addBtn = document.getElementById("addbtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const updateUi = document.getElementById("updateUi");

      onAuthStateChanged(auth, (user) => {
        if (user) {
          adminName.innerText = user.email;
          getData();

          addBtn.addEventListener("click", async () => {
            const pName = document.getElementById("ProductName").value.trim();
            const img = document.getElementById("imglink").value.trim();
            const price = document.getElementById("productPrice").value.trim();

            if (!pName || !img || !price) {
              alert("Please fill all fields");
              return;
            }

            try {
              await addDoc(collection(db, "products"), {
                userId: user.uid,
                pName: pName,
                price: Number(price),
                img: img,
                createdAt: new Date(),
              });
              document.getElementById("ProductName").value = "";
              document.getElementById("imglink").value = "";
              document.getElementById("productPrice").value = "";
              getData();
            } catch (err) {
              console.error("Error adding product:", err);
            }
          });

          logoutBtn.addEventListener("click", async () => {
            await signOut(auth);
            window.location.href = "login.html";
          });
        } else {
          window.location.href = "login.html";
        }
      });

      async function getData() {
        try {
          const productsCol = collection(db, "products");
          const productsSnapshot = await getDocs(productsCol);
          const productsList = productsSnapshot.docs.map((doc) => ({
            id: doc.id,
            ...doc.data(),
          }));
          display(productsList);
        } catch (err) {
          console.error("Error fetching data:", err);
        }
      }

      function display(data) {
        updateUi.innerHTML = "";
        data.forEach((ele) => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <h4>${ele.pName}</h4>
            <img src="${ele.img}" alt="${ele.pName}" />
            <h5>₹${ele.price}</h5>
            <button>EDIT</button>
            <button>DELETE</button>
          `;
          updateUi.appendChild(div);
        });
      }
    </script>
  </body>
</html>
