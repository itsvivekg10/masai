<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>React Weather Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- React and ReactDOM from CDN -->
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <!-- React Router from CDN -->
    <script
      src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"
      crossorigin
    ></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 2rem;
      }
      .container {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      input {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        margin-bottom: 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        margin-bottom: 1rem;
      }
      iframe {
        width: 100%;
        height: 300px;
        border: none;
        margin-top: 1rem;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/javascript">
      const { useState, useEffect } = React;
      const { createRoot } = ReactDOM;
      const { BrowserRouter, Routes, Route, useNavigate, useParams } =
        ReactRouterDOM;

      const OPENWEATHER_API_KEY = "YOUR_OPENWEATHER_API_KEY";
      const GOOGLE_MAPS_API_KEY = "YOUR_GOOGLE_MAPS_API_KEY";

      function Home() {
        const [city, setCity] = useState("");
        const navigate = useNavigate();

        const handleSearch = (e) => {
          if (e.key === "Enter" && city.trim()) {
            navigate(`/weather/${encodeURIComponent(city.trim())}`);
          }
        };

        return (
          <div className="container">
            <h1>Weather Dashboard</h1>
            <input
              type="text"
              placeholder="Enter city name..."
              value={city}
              onChange={(e) => setCity(e.target.value)}
              onKeyDown={handleSearch}
            />
          </div>
        );
      }

      function Weather() {
        const { city } = useParams();
        const [weather, setWeather] = useState(null);
        const [error, setError] = useState(null);
        const navigate = useNavigate();

        useEffect(() => {
          async function fetchWeather() {
            try {
              setError(null);
              const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${OPENWEATHER_API_KEY}&units=metric`
              );
              if (!res.ok) throw new Error("City not found");
              const data = await res.json();
              setWeather({
                temp: data.main.temp,
                humidity: data.main.humidity,
                condition: data.weather[0].description,
              });
            } catch (err) {
              setError(err.message);
              setWeather(null);
            }
          }
          fetchWeather();
        }, [city]);

        return (
          <div className="container">
            <button onClick={() => navigate("/")}>← Back</button>
            <h2>Weather in {decodeURIComponent(city)}</h2>
            {error && <p className="error">Error: {error}</p>}
            {weather && (
              <div>
                <p>
                  <strong>Temperature:</strong> {weather.temp}°C
                </p>
                <p>
                  <strong>Humidity:</strong> {weather.humidity}%
                </p>
                <p>
                  <strong>Condition:</strong> {weather.condition}
                </p>
                <iframe
                  src={`https://www.google.com/maps/embed/v1/place?key=${GOOGLE_MAPS_API_KEY}&q=${encodeURIComponent(
                    city
                  )}`}
                  allowFullScreen
                ></iframe>
              </div>
            )}
          </div>
        );
      }

      function App() {
        return (
          <BrowserRouter>
            <Routes>
              <Route path="/" element={<Home />} />
              <Route path="/weather/:city" element={<Weather />} />
              <Route
                path="*"
                element={<p className="container">Page not found.</p>}
              />
            </Routes>
          </BrowserRouter>
        );
      }

      const root = createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
