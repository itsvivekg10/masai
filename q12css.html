<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Property Demo</title>
    <style>
      .block-element {
        display: block;
        width: 100%;
        border: 2px solid black;
        padding: 10px;
        margin-bottom: 10px;
      }
      .inline-element {
        display: inline;
        background-color: lightblue;
        padding: 5px;
      }
      .inline-block-element {
        display: inline-block;
        width: 150px;
        height: 50px;
        background-color: lightgreen;
        text-align: center;
        line-height: 50px;
        margin: 5px;
        border: 1px solid darkgreen;
      }
      .hidden-element {
        display: none;
        background-color: lightcoral;
        padding: 10px;
        margin-top: 10px;
      }
      /* CSS Toggle using checkbox */
      #toggle:checked ~ .hidden-element {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="block-element">This is a block element.</div>
    <span class="inline-element">This is an inline element.</span>
    <div class="inline-block-element">Inline-Block</div>

    <input type="checkbox" id="toggle" style="display: none" />
    <label
      for="toggle"
      style="
        cursor: pointer;
        display: block;
        margin-top: 10px;
        background-color: gray;
        padding: 5px;
        text-align: center;
        color: white;
      "
      >Toggle Hidden Element</label
    >
    <div class="hidden-element">This element is hidden.</div>
  </body>
</html>
