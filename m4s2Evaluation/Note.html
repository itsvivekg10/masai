<script>
  console.log("hello word for note page");
  async function fetchData() {
    try {
      let res = await fetch(
        "https://notes-26a54-default-rtdb.asia-southeast1.firebasedatabase.app/notes.json"
      );
      let datas = await res.json();
      rederData(datas);
    } catch (err) {
      console.log(err);
    }
  }
  function rederData(datas) {
    let main = document.getElementById("main");
    main.innerHTML = "";
    datas = Object.entries(datas);
    console.log(datas);
    datas.forEach((data) => {
      data.forEach((dat) => {
        let bod = document.createElement("div");
        bod.innerHTML = `<h2>${dat.title}</h2><p>${dat.text}</p><img src=${dat.imgUpload}>`;
        main.appendChild(bod);
      });
    });
  }

  fetchData();
</script>
