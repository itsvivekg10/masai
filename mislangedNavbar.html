<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug Navbar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <style>/* Reset default styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
    }
    
    /* Navbar Container */
    .navbar {
      display: flex;
      justify-content: space-between; /* Ensures proper alignment */
      align-items: center; /* Align items vertically */
      background-color: #333;
      padding: 15px 20px;
    }
    
    /* Logo */
    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
    
    /* Navigation Links */
    .links {
      display: flex;  /* Make links align horizontally */
      gap: 20px;  /* Even spacing between links */
    }
    
    /* Individual Link Styling */
    .links a {
      text-decoration: none;
      color: white;
      padding: 8px 12px;
      transition: color 0.3s ease;
    }
    
    .links a:hover {
      color: #0088cc;
    }
    </style>
  <body>
    <div class="navbar">
      <div class="logo">Logo</div>
      <div class="links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </div>
    </div>
  </body>
</html>
