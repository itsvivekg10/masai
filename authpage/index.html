<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div
      style="
        width: 400px;
        height: fit-content;
        border-color: black;
        border-style: solid;
        border-width: 1px;
        background-color: beige;
        margin-left: 450px;
        margin-top: 100px;
      "
    >
      <div
        style="
          align-items: center;
          display: flex;
          flex-direction: column;
          row-gap: 10px;
        "
      >
        <h2>REGISTER</h2>
        <input
          id="email"
          placeholder="Enter Your mail"
          style="width: 250px; height: 30px"
        />
        <input
          id="pass"
          placeholder="Enter Your pass"
          style="width: 250px; height: 30px"
        />
        <button
          id="rgstrBtn"
          style="
            width: 100px;
            background-color: #bec5d2;
            height: 30px;
            border-radius: 6px;
          "
        >
          Register
        </button>
        <p>Already Login ?</p>
        <a href="login.html">login</a>
      </div>
    </div>
  </body>
</html>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHw65zq7-ZlMhDjLhwcy1lVxv98tNL40E",
    authDomain: "authentication-9762a.firebaseapp.com",
    projectId: "authentication-9762a",
    storageBucket: "authentication-9762a.firebasestorage.app",
    messagingSenderId: "1077604200859",
    appId: "1:1077604200859:web:f685d2c47ac5fdfd85b13e",
    measurementId: "G-X84XVF1026",
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  let signUp = document.getElementById("rgstrBtn");
  signUp.addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;

    createUserWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        window.location.href = "dh.html";
        console.log("User registered:", userCredential.user);
        alert("Registration successful!");
      })
      .catch((error) => {
        console.error("Error:", error.message);
        alert("Error: " + error.message);
      });
  });
</script>
