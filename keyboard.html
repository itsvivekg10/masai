<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keyboard UI</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
      }

      .keyboard {
        display: inline-block;
        background: #222;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      }

      .row {
        display: flex;
        justify-content: center;
        margin-bottom: 8px;
      }

      .key {
        background: #333;
        color: #fff;
        border: 1px solid #444;
        border-radius: 5px;
        margin: 2px;
        padding: 15px 12px;
        min-width: 40px;
        text-align: center;
        box-shadow: inset 0 -2px 0 #111;
        cursor: pointer;
        user-select: none;
      }

      .key.wide {
        min-width: 80px;
      }

      .key.space {
        min-width: 260px;
      }

      .key:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div class="keyboard">
      <div class="row">
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
      </div>
      <div class="row">
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
      </div>
      <div class="row">
        <div class="key">Z</div>
        <div class="key">X</div>
        <div class="key">C</div>
        <div class="key">V</div>
        <div class="key">B</div>
        <div class="key">N</div>
        <div class="key">M</div>
      </div>
      <div class="row">
        <div class="key wide">Shift</div>
        <div class="key space">Space</div>
        <div class="key wide">Enter</div>
      </div>
    </div>
  </body>
</html>
