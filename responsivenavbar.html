<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Navbar</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
      }

      .navbar {
        background-color: rebeccapurple;
        color: white;
        padding: 1rem;
      }

      .navbar-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .brand {
        font-size: 1.5rem;
      }

      .nav-toggle {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .nav-items {
        display: flex;
        gap: 1.5rem;
      }

      .nav-items a {
        color: white;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .nav-items a:hover {
        color: #f0a500;
      }

      @media (max-width: 1023px) {
        .nav-items {
          flex-direction: column;
          align-items: center;
          width: 100%;
          margin-top: 1rem;
          display: none;
        }

        .nav-items.show {
          display: flex;
        }

        .nav-toggle {
          display: block;
        }
      }

      @media (max-width: 768px) {
        .navbar-container {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-container">
        <div class="brand">MASAI</div>
        <div class="nav-toggle" onclick="toggleMenu()">☰</div>
        <div class="nav-items" id="navItems">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Services</a>
          <a href="#">Contact</a>
        </div>
      </div>
    </nav>
  </body>
</html>
