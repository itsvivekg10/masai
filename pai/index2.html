<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <input type="text" />
  <div id="boxContain"></div>
  <button>Next</button
  ><button>Prev</button>
</html>
<script>
  let boxContain = document.getElementById("boxContain");
  async function fetchData() {
    try {
      let data = await fetch("https://jsonplaceholder.typicode.com/users");
      let res = await data.json();
      console.log(res);
      res.map((ele) => {
        boxContain.innerHTML = `<h1>${ele.name}</h1><h2>${ele.email}</h2>$<h2>${ele.company.name}</h2><h2>${ele.address.city}</h2>`;
      });
    } catch (err) {
      console.log(err);
    }
  }
  fetchData();
</script>
