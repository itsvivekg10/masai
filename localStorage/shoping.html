<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multi-User Shopping Cart</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 2rem;
        max-width: 800px;
        margin: auto;
      }
      input,
      button {
        margin: 5px;
        padding: 8px;
      }
      table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>Multi-User Shopping Cart</h2>

    <!-- Login -->
    <div id="loginSection">
      <input
        type="text"
        id="usernameInput"
        placeholder="Enter unique username"
      />
      <button onclick="loginUser()">Login</button>
    </div>

    <!-- Cart Section -->
    <div id="cartSection" class="hidden">
      <h3 id="welcomeMessage"></h3>

      <!-- Add Item -->
      <input type="text" id="itemName" placeholder="Item Name" />
      <input type="number" id="itemPrice" placeholder="Price" />
      <input type="number" id="itemQuantity" placeholder="Quantity" />
      <button onclick="addItem()">Add Item</button>

      <!-- Cart Table -->
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Update</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>

      <h4>Total Cost: $<span id="totalCost">0</span></h4>
      <button onclick="logout()">Logout</button>
    </div>

    <script>
      let currentUser = "";

      function loginUser() {
        const username = document.getElementById("usernameInput").value.trim();
        if (!username) {
          alert("Please enter a username.");
          return;
        }

        const allData = JSON.parse(localStorage.getItem("shoppingCarts")) || {};

        // Initialize user's cart if not present
        if (!allData[username]) {
          allData[username] = [];
          localStorage.setItem("shoppingCarts", JSON.stringify(allData));
        }

        currentUser = username;
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("cartSection").classList.remove("hidden");
        document.getElementById(
          "welcomeMessage"
        ).textContent = `Welcome, ${username}`;
        renderCart();
      }

      function getUserCart() {
        const allData = JSON.parse(localStorage.getItem("shoppingCarts")) || {};
        return allData[currentUser] || [];
      }

      function saveUserCart(cart) {
        const allData = JSON.parse(localStorage.getItem("shoppingCarts")) || {};
        allData[currentUser] = cart;
        localStorage.setItem("shoppingCarts", JSON.stringify(allData));
      }

      function addItem() {
        const name = document.getElementById("itemName").value.trim();
        const price = parseFloat(document.getElementById("itemPrice").value);
        const quantity = parseInt(
          document.getElementById("itemQuantity").value
        );

        if (!name || price <= 0 || quantity <= 0) {
          alert("Please enter valid item details.");
          return;
        }

        let cart = getUserCart();

        const existing = cart.find((item) => item.itemName === name);
        if (existing) {
          existing.quantity += quantity;
        } else {
          cart.push({ itemName: name, price, quantity });
        }

        saveUserCart(cart);
        renderCart();

        // Clear input fields
        document.getElementById("itemName").value = "";
        document.getElementById("itemPrice").value = "";
        document.getElementById("itemQuantity").value = "";
      }

      function updateQuantity(index) {
        const newQty = parseInt(prompt("Enter new quantity:"));
        if (newQty <= 0 || isNaN(newQty)) {
          alert("Invalid quantity.");
          return;
        }

        let cart = getUserCart();
        cart[index].quantity = newQty;
        saveUserCart(cart);
        renderCart();
      }

      function removeItem(index) {
        let cart = getUserCart();
        cart.splice(index, 1);
        saveUserCart(cart);
        renderCart();
      }

      function renderCart() {
        const cart = getUserCart();
        const tbody = document.getElementById("cartBody");
        const totalCostEl = document.getElementById("totalCost");
        tbody.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
          const row = document.createElement("tr");

          const itemTotal = item.price * item.quantity;
          total += itemTotal;

          row.innerHTML = `
          <td>${item.itemName}</td>
          <td>$${item.price.toFixed(2)}</td>
          <td>${item.quantity}</td>
          <td>$${itemTotal.toFixed(2)}</td>
          <td><button onclick="updateQuantity(${index})">Edit</button></td>
          <td><button onclick="removeItem(${index})">Remove</button></td>
        `;
          tbody.appendChild(row);
        });

        totalCostEl.textContent = total.toFixed(2);
      }

      function logout() {
        currentUser = "";
        document.getElementById("loginSection").classList.remove("hidden");
        document.getElementById("cartSection").classList.add("hidden");
        document.getElementById("usernameInput").value = "";
      }
    </script>
  </body>
</html>
