<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>React SPA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    nav {
      background-color: #0088cc;
      padding: 10px;
    }

    nav span {
      margin-right: 20px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .content {
      padding: 30px;
      min-height: 300px;
    }

    .home {
      background-color: #e0f7fa;
    }

    .about {
      background-color: #fff3e0;
    }

    .contact {
      background-color: #fce4ec;
    }
  </style>
</head>
<body>
  <div id="root"></div>

 
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

 
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

 
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [activePage, setActivePage] = useState("home");

      const renderPage = () => {
        switch (activePage) {
          case "home":
            return <div className="content home">🏠 <h2>Welcome to Home</h2></div>;
          case "about":
            return <div className="content about">📖 <h2>About Us</h2></div>;
          case "contact":
            return <div className="content contact">📞 <h2>Contact Us</h2></div>;
          default:
            return null;
        }
      };

      return (
        <div>
          <nav>
            <span onClick={() => setActivePage("home")}>Home</span>
            <span onClick={() => setActivePage("about")}>About</span>
            <span onClick={() => setActivePage("contact")}>Contact</span>
          </nav>
          {renderPage()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
