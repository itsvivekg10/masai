<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Form</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(to right, #e0f7fa, #ffffff);
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
        transition: border 0.3s;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #0088cc;
        outline: none;
      }

      textarea {
        min-height: 100px;
      }

      button {
        width: 100%;
        padding: 14px;
        background-color: #0088cc;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 16px;
        transition: background-color 0.3s;
      }

      button:hover {
        background-color: #0077b3;
      }

      #display-user {
        margin-top: 30px;
      }

      .user-card {
        background: #f9f9f9;
        border-left: 4px solid #0088cc;
        border-radius: 6px;
        padding: 16px 20px;
        margin-bottom: 15px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .user-info {
        max-width: 80%;
      }

      .user-card h1 {
        font-size: 18px;
        color: #333;
        margin: 0 0 6px 0;
      }

      .user-card p {
        font-size: 15px;
        color: #555;
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .user-card button {
        background-color: #0077b3;
        width: auto;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 14px;
      }

      .user-card button:hover {
        background-color: #005f80;
      }

      @media (max-width: 600px) {
        .container {
          padding: 20px;
        }

        .user-card h1 {
          font-size: 16px;
        }

        .user-card p {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" id="name" placeholder="Enter name" />
      <textarea id="msg" placeholder="Enter message"></textarea>
      <button id="save">Save</button>
      <button id="update" style="display: none">Update</button>

      <div id="display-user"></div>
    </div>

    <script>
      const saveBtn = document.getElementById("save");
      const updateBtn = document.getElementById("update");
      const nameInput = document.getElementById("name");
      const msgInput = document.getElementById("msg");
      const displayUser = document.getElementById("display-user");

      let editUserId = null;

      saveBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        const msg = msgInput.value.trim();

        if (!name || !msg) {
          alert("Please fill in both name and message.");
          return;
        }

        await fetch(
          "https://studentdashbord-default-rtdb.asia-southeast1.firebasedatabase.app/users.json",
          {
            method: "POST",
            headers: { "Content-type": "application/json" },
            body: JSON.stringify({ name, msg }),
          }
        );

        clearForm();
        fetchData();
      });

      updateBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        const msg = msgInput.value.trim();

        if (!name || !msg) {
          alert("Please fill in both name and message.");
          return;
        }

        if (!editUserId) return;

        await fetch(
          `https://studentdashbord-default-rtdb.asia-southeast1.firebasedatabase.app/users/${editUserId}.json`,
          {
            method: "PATCH",
            headers: { "Content-type": "application/json" },
            body: JSON.stringify({ name, msg }),
          }
        );

        clearForm();
        toggleButtons(false);
        fetchData();
        editUserId = null;
      });

      function toggleButtons(isEditing) {
        saveBtn.style.display = isEditing ? "none" : "block";
        updateBtn.style.display = isEditing ? "block" : "none";
      }

      function clearForm() {
        nameInput.value = "";
        msgInput.value = "";
      }

      async function fetchData() {
        const response = await fetch(
          "https://studentdashbord-default-rtdb.asia-southeast1.firebasedatabase.app/users.json"
        );
        let data = await response.json();
        if (!data) {
          displayUser.innerHTML = "<p>No users found.</p>";
          return;
        }
        const entries = Object.entries(data);
        display(entries);
      }

      function display(data) {
        displayUser.innerHTML = "";
        data.forEach(([id, user]) => {
          const card = document.createElement("div");
          card.className = "user-card";

          card.innerHTML = `
          <div class="user-info">
            <h1>${user.name}</h1>
            <p>${user.msg}</p>
          </div>
          <button onclick="editUser('${id}', '${
            user.name
          }', '${user.msg.replace(/'/g, "\\'")}')">Edit</button>
        `;
          displayUser.appendChild(card);
        });
      }

      window.editUser = function (id, name, msg) {
        editUserId = id;
        nameInput.value = name;
        msgInput.value = msg;
        toggleButtons(true);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      // Initial fetch
      fetchData();
    </script>
  </body>
</html>
