<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #0088cc;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background-color: #0077b3;
      }

      #display-user {
        margin-top: 30px;
      }

      .user-card {
        background: #ffffff;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .user-card h1 {
        font-size: 20px;
        margin: 0;
      }

      .user-card h2 {
        font-size: 16px;
        color: #555;
        margin: 5px 0 0 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <input type="text" id="name" placeholder="Enter name" />
      <input type="email" id="email" placeholder="Enter email" />
      <button id="save">Save</button>

      <div id="display-user"></div>
    </div>

    <script>
      let savebtn = document.getElementById("save");
      savebtn.addEventListener("click", getData);

      async function getData() {
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();

        if (!name || !email) {
          alert("Please fill in both name and email.");
          return;
        }

        await fetch(
          "https://studentdashbord-default-rtdb.asia-southeast1.firebasedatabase.app/users.json",
          {
            method: "POST",
            headers: { "Content-type": "application/json" },
            body: JSON.stringify({ name, email }),
          }
        );

        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        fetchData(); // Refresh after saving
      }

      async function fetchData() {
        let data = await fetch(
          "https://studentdashbord-default-rtdb.asia-southeast1.firebasedatabase.app/users.json"
        );
        let res = await data.json();
        let userList = Object.values(res || {});
        display(userList);
      }

      let render = document.getElementById("display-user");

      function display(data) {
        render.innerHTML = "";
        data.forEach((ele) => {
          let card = document.createElement("div");
          card.className = "user-card";

          let h1 = document.createElement("h1");
          let h2 = document.createElement("h2");

          h1.innerText = ele.name;
          h2.innerText = ele.email;

          card.appendChild(h1);
          card.appendChild(h2);
          render.appendChild(card);
        });
      }

      fetchData();
    </script>
  </body>
</html>
