    <meta charset="UTF-8" />
    <title>Search Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #searchBox {
        width: 300px;
        padding: 10px;
        font-size: 16px;
      }
      #results {
        margin-top: 20px;
        max-height: 300px;
        overflow-y: auto;
        width: 300px;
      }
      .name-item {
        padding: 5px 10px;
        border-bottom: 1px solid #ddd;
      }
      .highlight {
        background-color: yellow;
      }
      #stats {
        margin-top: 20px;
      }
      #loader {
        margin-top: 10px;
        color: blue;
      }
      #noResults {
        margin-top: 10px;
        color: red;
      }
      #backToTop {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="noResults" style="display: none">No results found</div>
    <div id="results"></div>

        baseNames.forEach((name) => names.push(name + i));

      const searchBox = document.getElementById("searchBox");
      const resultsContainer = document.getElementById("results");
      const loader = document.getElementById("loader");
      const noResults = document.getElementById("noResults");
      const keystrokesDisplay = document.getElementById("keystrokes");
      const searchCountDisplay = document.getElementById("searchCount");
      const backToTopBtn = document.getElementById("backToTop");

      let keystrokes = 0;
      let searchCount = 0;

      // Debounce function
      function debounce(func, delay) {
        let timeout;
        return function (...args) {
          loader.style.display = "block";
          clearTimeout(timeout);
          timeout = setTimeout(() => {
            loader.style.display = "none";
            func.apply(this, args);
          }, delay);
        };
      }

      // Throttle function
      function throttle(func, limit) {
        let inThrottle;
        return function (...args) {
          if (!inThrottle) {
            func.apply(this, args);
            inThrottle = true;
            setTimeout(() => (inThrottle = false), limit);
          }
        };
      }

      // Highlight matching text
      function highlight(text, query) {
        const regex = new RegExp(`(${query})`, "gi");
        return text.replace(regex, '<span class="highlight">$1</span>');
      }

      function renderResults(query) {
        resultsContainer.innerHTML = "";
        if (!query) return;
        const matched = names.filter((name) =>
          name.toLowerCase().includes(query.toLowerCase())
        );
        if (matched.length === 0) {
          noResults.style.display = "block";
        } else {
          noResults.style.display = "none";
          matched.forEach((name) => {
            const div = document.createElement("div");
            div.className = "name-item";
            div.innerHTML = highlight(name, query);
            resultsContainer.appendChild(div);
          });
        }
        searchCount++;
        searchCountDisplay.textContent = searchCount;
      }

      const debouncedSearch = debounce(function () {
        const query = searchBox.value.trim();
        renderResults(query);
      }, 1000);

      searchBox.addEventListener("input", () => {
        keystrokes++;
        keystrokesDisplay.textContent = keystrokes;
        debouncedSearch();
      });

      // Scroll listener for Back to Top button
      window.addEventListener(
        "scroll",
        throttle(() => {
          if (window.scrollY > 200) {
            backToTopBtn.style.display = "block";
          } else {
            backToTopBtn.style.display = "none";
          }
        }, 500)
      );

      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    </script>
