<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <label>Name</label>
    <input id="name" type="text" placeholder="Enter Your Name" />
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter Your Mail" />
    <button id="Add" onclick="addData()">Add</button>
    <h2>User Details</h2>
    <div id="userList"></div>
    <script>
      async function addData() {
        let details = {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
        };

        let res = await fetch(
          "https://users-32697-default-rtdb.asia-southeast1.firebasedatabase.app/details.json",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(details),
          }
        );

        let data = await res.json();
        console.log("Successfully added:", data);

        // Optionally clear inputs
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
      }
      let arr = [];
      async function fetchUser() {
        let userList = document.getElementById("userList");
        userList.innerHTML = "";
        try {
          let res = await fetch(
            "https://users-32697-default-rtdb.asia-southeast1.firebasedatabase.app/details.json"
          );
          let data = await res.json();
          for (let key in data) {
            let user = data[key];
            userList.innerHTML += `<p>${user.name} ${user.email}</p> <button onClick="editData(${key})">EDIT</button>`;
          }
        } catch (err) {
          console.log(err);
        }
      }
      async function editData() {
        let res = await fetch(
          "https://users-32697-default-rtdb.asia-southeast1.firebasedatabase.app/details.json",
          {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: json.stringify({}),
          }
        );
      }
      fetchUser();
    </script>
  </body>
</html>
